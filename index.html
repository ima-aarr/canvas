<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Web Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Sawarabi+Gothic&family=Sawarabi+Mincho&family=Yusei+Magic&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <aside id="sidebar">
        <h2>Pro Builder</h2>
        
        <div class="panel-section">
            <h3>要素追加</h3>
            <button id="btn-add-text" class="ui-btn">📝 テキストを追加</button>
            <div class="shape-controls">
                <select id="select-shape" class="ui-select">
                    <option value="rect">四角形</option>
                    <option value="circle">円形</option>
                    <option value="triangle">三角形</option>
                    <option value="star">星型</option>
                </select>
                <button id="btn-add-shape" class="ui-btn">＋ 固定図形</button>
            </div>
            <button id="btn-add-polygon" class="ui-btn action-script">⬣ 多角形 (頂点編集)</button>
            
            <label class="ui-btn file-upload-btn">
                🖼 画像を挿入
                <input type="file" id="input-add-image" accept="image/png, image/jpeg, image/gif, image/webp">
            </label>
        </div>

        <div class="panel-section">
            <h3>テキスト編集</h3>
            <label>フォント</label>
            <select id="select-font-family" class="ui-select">
                <option value="'Noto Sans JP', sans-serif">Noto Sans JP (ゴシック)</option>
                <option value="'Noto Serif JP', serif">Noto Serif JP (明朝)</option>
                <option value="'M PLUS Rounded 1c', sans-serif">M PLUS Rounded (丸ゴシック)</option>
                <option value="'Sawarabi Gothic', sans-serif">Sawarabi (ゴシック)</option>
                <option value="'Sawarabi Mincho', serif">Sawarabi (明朝)</option>
                <option value="'Yusei Magic', sans-serif">油性マジック (手書き)</option>
            </select>
            
            <label>文字サイズ (px)</label>
            <input type="number" id="input-font-size" value="24" min="8" max="200" class="ui-input">
        </div>

        <div class="panel-section">
            <h3>カラー＆スタイル</h3>
            <label>基本カラー (文字/図形)</label>
            <input type="color" id="input-color" value="#000000">
            
            <label>背景グラデーション (四角形用)</label>
            <div class="gradient-controls">
                <input type="color" id="input-grad-color1" value="#ff7e5f">
                <input type="color" id="input-grad-color2" value="#feb47b">
            </div>
            <label>角度 (度)</label>
            <input type="number" id="input-grad-angle" value="45" min="0" max="360" class="ui-input">
            <button id="btn-apply-gradient" class="ui-btn ui-btn-small">グラデーション適用</button>
        </div>

        <div class="panel-section">
            <h3>配置・レイヤー</h3>
            <div class="layer-controls">
                <button id="btn-layer-up" class="ui-btn ui-btn-small">↑ 手前へ</button>
                <button id="btn-layer-down" class="ui-btn ui-btn-small">↓ 奥へ</button>
            </div>
        </div>

        <div class="panel-section">
            <h3>アニメーション (2D/3D)</h3>
            <button id="btn-anim-bounce" class="ui-btn ui-btn-small">バウンド</button>
            <button id="btn-anim-pulse" class="ui-btn ui-btn-small">パルス</button>
            <button id="btn-anim-3d-spin" class="ui-btn ui-btn-small action-3d">3D 回転</button>
            <button id="btn-anim-3d-flip" class="ui-btn ui-btn-small action-3d">3D フリップ</button>
            <button id="btn-anim-clear" class="ui-btn ui-btn-small danger">解除</button>
        </div>

        <button id="btn-export" class="ui-btn export-btn">📥 HTMLをエクスポート</button>
    </aside>

    <main id="workspace">
        <div id="canvas-wrapper">
            <div id="canvas">
                </div>
        </div>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
